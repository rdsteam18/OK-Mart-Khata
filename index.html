<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>OK Mart Khata - Dashboard</title>
    <link rel="stylesheet" href="css/khata.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF5722">
</head>
<body>

<!-- Login Protection Script - MUST be first -->
<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
    import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
    
    // 🔴🔴🔴 YAHAN APNA FIREBASE CONFIG DALO 🔴🔴🔴
   const firebaseConfig = {
  apiKey: "AIzaSyAWL9DQhuyah1ntZgUwqFHegWcm_uvKyus",
  authDomain: "ok-mart-khata.firebaseapp.com",
  projectId: "ok-mart-khata",
  storageBucket: "ok-mart-khata.firebasestorage.app",
  messagingSenderId: "334851811921",
  appId: "1:334851811921:web:804863c35baa17dd61a670",
  measurementId: "G-GFM55V38D2"
};
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    // Make auth and db available globally
    window.auth = auth;
    window.db = db;
    
    // Check login status
    onAuthStateChanged(auth, (user) => {
        if (!user) {
            // Not logged in - redirect to login
            console.log("No user found, redirecting to login...");
            window.location.href = 'login.html';
        } else {
            console.log("Logged in as:", user.email);
            document.body.style.display = 'block';
            loadDashboardData();
            loadStoreSettings();
        }
    });
    
    // Load store settings (logo, name)
    async function loadStoreSettings() {
        try {
            const settingsRef = doc(db, 'settings', 'store_settings');
            const settingsSnap = await getDoc(settingsRef);
            if (settingsSnap.exists()) {
                const data = settingsSnap.data();
                if (data.logoUrl) {
                    const logoImg = document.getElementById('storeLogo');
                    if (logoImg) logoImg.src = data.logoUrl;
                }
                if (data.storeName) {
                    const storeNameEl = document.getElementById('storeName');
                    if (storeNameEl) storeNameEl.innerText = data.storeName;
                }
                if (data.primaryColor) {
                    document.documentElement.style.setProperty('--primary', data.primaryColor);
                }
            }
        } catch (error) {
            console.log("Settings load error:", error);
        }
    }
    
    // Make logout function global
    window.logout = async function() {
        try {
            await signOut(auth);
            window.location.href = 'login.html';
        } catch (error) {
            console.error("Logout error:", error);
        }
    };
    
    // Dashboard data functions
    async function loadDashboardData() {
        // Your existing dashboard load functions here
        console.log("Loading dashboard data...");
    }
    
    // Initially hide body until login check
    document.body.style.display = 'none';
</script>

<!-- Mobile Bottom Navigation -->
<div class="mobile-bottom-nav">
    <div class="nav-item active" data-page="dashboard">
        <span>🏠</span>
        <span class="nav-label">डैशबोर्ड</span>
    </div>
    <div class="nav-item" data-page="customers">
        <span>👥</span>
        <span class="nav-label">ग्राहक</span>
    </div>
    <div class="nav-item" data-page="add" id="fabNavBtn">
        <span>➕</span>
        <span class="nav-label">एड</span>
    </div>
    <div class="nav-item" data-page="reports">
        <span>📊</span>
        <span class="nav-label">रिपोर्ट</span>
    </div>
    <div class="nav-item" data-page="profile" id="logoutNavBtn">
        <span>🚪</span>
        <span class="nav-label">लॉगआउट</span>
    </div>
</div>

<!-- Main Content -->
<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <img src="assets/images/logo-placeholder.png" alt="Logo" class="logo" id="storeLogo">
        </div>
        <div class="header-right">
            <button class="dark-mode-btn" id="darkModeBtn">🌙</button>
        </div>
    </div>

    <!-- Welcome Section -->
    <div class="welcome-section">
        <h2>नमस्ते, 👋</h2>
        <p id="storeName">OK Mart</p>
    </div>

    <!-- Stats Cards Grid -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">💰</div>
            <div class="stat-info">
                <span class="stat-label">कुल बकाया</span>
                <span class="stat-value" id="totalDue">₹0</span>
            </div>
        </div>
        
        <div class="stat-card">
            <div class="stat-icon">📅</div>
            <div class="stat-info">
                <span class="stat-label">आज की कलेक्शन</span>
                <span class="stat-value" id="todayCollection">₹0</span>
            </div>
        </div>
        
        <div class="stat-card">
            <div class="stat-icon">✅</div>
            <div class="stat-info">
                <span class="stat-label">कुल भुगतान</span>
                <span class="stat-value" id="totalPaid">₹0</span>
            </div>
        </div>
        
        <div class="stat-card">
            <div class="stat-icon">👥</div>
            <div class="stat-info">
                <span class="stat-label">कुल ग्राहक</span>
                <span class="stat-value" id="totalCustomers">0</span>
            </div>
        </div>
    </div>

    <!-- Loading indicator -->
    <div id="loadingMessage" style="text-align: center; padding: 40px;">
        ⏳ Loading dashboard data...
    </div>
</div>

<!-- Floating Action Button -->
<button class="fab" id="fabBtn">
    <span>➕</span>
</button>

<!-- Bottom Sheet for Add Entry -->
<div class="bottom-sheet" id="addEntrySheet">
    <div class="sheet-overlay"></div>
    <div class="sheet-content">
        <div class="sheet-handle"></div>
        <div class="sheet-body">
            <h3>नई एंट्री जोड़ें</h3>
            
            <div class="form-group">
                <label>ग्राहक चुनें</label>
                <select id="customerSelect" class="form-control">
                    <option value="">-- ग्राहक चुनें --</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>एंट्री टाइप</label>
                <div class="segmented-control">
                    <button class="segment active" data-type="credit">➕ क्रेडिट</button>
                    <button class="segment" data-type="payment">💰 पेमेंट</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>रकम (₹)</label>
                <input type="number" id="amount" class="form-control" placeholder="0" inputmode="decimal">
            </div>
            
            <div class="quick-amounts">
                <button class="quick-amount" data-amount="10">+10</button>
                <button class="quick-amount" data-amount="20">+20</button>
                <button class="quick-amount" data-amount="50">+50</button>
                <button class="quick-amount" data-amount="100">+100</button>
                <button class="quick-amount" data-amount="500">+500</button>
            </div>
            
            <div class="form-group">
                <label>नोट (वैकल्पिक)</label>
                <input type="text" id="note" class="form-control" placeholder="जैसे: किराना सामान">
            </div>
            
            <button class="btn-primary" id="saveEntryBtn">💾 एंट्री सेव करें</button>
        </div>
    </div>
</div>

<script type="module">
    import { getFirestore, collection, query, getDocs, orderBy, limit, where, addDoc, doc, getDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
    import { getAuth } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
    
    const db = window.db;
    const auth = window.auth;
    
    // Load Dashboard Data
    async function loadDashboardData() {
        try {
            const loadingMsg = document.getElementById('loadingMessage');
            
            // Get customers
            const customersRef = collection(db, 'customers');
            const customersSnapshot = await getDocs(customersRef);
            let totalDue = 0;
            let totalCustomers = 0;
            
            customersSnapshot.forEach(doc => {
                const data = doc.data();
                totalDue += data.totalDue || 0;
                totalCustomers++;
            });
            
            document.getElementById('totalDue').innerText = '₹' + totalDue.toLocaleString();
            document.getElementById('totalCustomers').innerText = totalCustomers;
            
            // Get today's collection
            const today = new Date().toISOString().slice(0,10);
            const ledgerRef = collection(db, 'ledger');
            const todayQuery = query(ledgerRef, where('type', '==', 'payment'), where('date', '==', today));
            const todaySnapshot = await getDocs(todayQuery);
            let todayTotal = 0;
            todaySnapshot.forEach(doc => {
                todayTotal += doc.data().amount || 0;
            });
            document.getElementById('todayCollection').innerText = '₹' + todayTotal.toLocaleString();
            
            // Get total paid (all time)
            const paidQuery = query(ledgerRef, where('type', '==', 'payment'));
            const paidSnapshot = await getDocs(paidQuery);
            let totalPaid = 0;
            paidSnapshot.forEach(doc => {
                totalPaid += doc.data().amount || 0;
            });
            document.getElementById('totalPaid').innerText = '₹' + totalPaid.toLocaleString();
            
            if (loadingMsg) loadingMsg.style.display = 'none';
            
        } catch (error) {
            console.error("Error loading dashboard:", error);
            const loadingMsg = document.getElementById('loadingMessage');
            if (loadingMsg) loadingMsg.innerHTML = '❌ Error loading data. Please refresh.';
        }
    }
    
    // Load Customers for Dropdown
    async function loadCustomerDropdown() {
        try {
            const customersRef = collection(db, 'customers');
            const snapshot = await getDocs(customersRef);
            const select = document.getElementById('customerSelect');
            if (!select) return;
            select.innerHTML = '<option value="">-- ग्राहक चुनें --</option>';
            snapshot.forEach(doc => {
                const data = doc.data();
                select.innerHTML += `<option value="${doc.id}">${data.name} (${data.phone})</option>`;
            });
        } catch (error) {
            console.error("Error loading customers:", error);
        }
    }
    
    // Save Entry
    async function saveEntry() {
        const customerId = document.getElementById('customerSelect').value;
        const type = document.querySelector('.segment.active').dataset.type;
        const amount = parseFloat(document.getElementById('amount').value);
        const note = document.getElementById('note').value;
        
        if (!customerId) {
            alert('कृपया ग्राहक चुनें');
            return;
        }
        if (!amount || amount <= 0) {
            alert('कृपया सही रकम डालें');
            return;
        }
        
        try {
            const ledgerRef = collection(db, 'ledger');
            const today = new Date().toISOString().slice(0,10);
            
            await addDoc(ledgerRef, {
                customerId: customerId,
                type: type,
                amount: amount,
                note: note,
                createdAt: new Date(),
                date: today,
                createdBy: auth.currentUser?.email || 'admin'
            });
            
            // Update customer totals
            const customerRef = doc(db, 'customers', customerId);
            const customerSnap = await getDoc(customerRef);
            const customerData = customerSnap.data();
            
            let newTotalAdded = customerData.totalAdded || 0;
            let newTotalPaid = customerData.totalPaid || 0;
            
            if (type === 'credit') {
                newTotalAdded += amount;
            } else {
                newTotalPaid += amount;
            }
            
            const newTotalDue = newTotalAdded - newTotalPaid;
            
            await updateDoc(customerRef, {
                totalAdded: newTotalAdded,
                totalPaid: newTotalPaid,
                totalDue: newTotalDue,
                lastPaymentDate: type === 'payment' ? new Date() : customerData.lastPaymentDate
            });
            
            alert('✅ एंट्री सेव हो गई!');
            closeBottomSheet();
            loadDashboardData();
            
            // Reset form
            document.getElementById('amount').value = '';
            document.getElementById('note').value = '';
            
        } catch (error) {
            console.error("Error saving entry:", error);
            alert('❌ एरर: ' + error.message);
        }
    }
    
    // Bottom Sheet Functions
    function openBottomSheet() {
        const sheet = document.getElementById('addEntrySheet');
        if (sheet) {
            sheet.classList.add('open');
            loadCustomerDropdown();
        }
    }
    
    function closeBottomSheet() {
        const sheet = document.getElementById('addEntrySheet');
        if (sheet) sheet.classList.remove('open');
    }
    
    // Make functions global
    window.saveEntry = saveEntry;
    window.loadDashboardData = loadDashboardData;
    
    // Event Listeners
    const fabBtn = document.getElementById('fabBtn');
    const fabNavBtn = document.getElementById('fabNavBtn');
    if (fabBtn) fabBtn.onclick = openBottomSheet;
    if (fabNavBtn) fabNavBtn.onclick = openBottomSheet;
    
    const sheetOverlay = document.querySelector('.sheet-overlay');
    if (sheetOverlay) sheetOverlay.onclick = closeBottomSheet;
    
    const saveBtn = document.getElementById('saveEntryBtn');
    if (saveBtn) saveBtn.onclick = saveEntry;
    
    // Quick amount buttons
    document.querySelectorAll('.quick-amount').forEach(btn => {
        btn.onclick = () => {
            const amountInput = document.getElementById('amount');
            if (amountInput) amountInput.value = btn.dataset.amount;
        };
    });
    
    // Segment control
    document.querySelectorAll('.segment').forEach(seg => {
        seg.onclick = () => {
            document.querySelectorAll('.segment').forEach(s => s.classList.remove('active'));
            seg.classList.add('active');
        };
    });
    
    // Dark Mode
    const darkModeBtn = document.getElementById('darkModeBtn');
    if (darkModeBtn) {
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            darkModeBtn.innerText = '☀️';
        }
        darkModeBtn.onclick = () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);
            darkModeBtn.innerText = isDark ? '☀️' : '🌙';
        };
    }
    
    // Navigation
    document.querySelectorAll('.nav-item').forEach(nav => {
        nav.onclick = (e) => {
            const page = nav.dataset.page;
            if (page === 'customers') location.href = 'customers.html';
            if (page === 'reports') location.href = 'reports.html';
            if (page === 'profile') logout();
        };
    });
    
    // Call loadDashboardData when ready (will be called after auth check)
    window.loadDashboardData = loadDashboardData;
    
    // Initial load (will be triggered after auth)
    setTimeout(() => {
        if (auth.currentUser) {
            loadDashboardData();
        }
    }, 1000);
</script>

</body>
</html>
