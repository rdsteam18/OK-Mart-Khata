<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug - Customer Detail</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #fff; }
        .box { background: #2d2d2d; padding: 15px; margin: 10px 0; border-radius: 8px; overflow-x: auto; }
        .success { color: #4CAF50; }
        .error { color: #F44336; }
        button { background: #FF5722; color: white; border: none; padding: 10px 20px; margin: 5px; border-radius: 5px; cursor: pointer; }
        pre { background: #000; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔧 Debug Mode</h1>
    
    <div class="box">
        <h3>1. Customer ID from URL:</h3>
        <p id="customerIdDisplay">Loading...</p>
    </div>
    
    <div class="box">
        <h3>2. Customer Data (from customers collection):</h3>
        <pre id="customerData">Loading...</pre>
    </div>
    
    <div class="box">
        <h3>3. Transactions (from ledger collection):</h3>
        <pre id="transactionData">Loading...</pre>
    </div>
    
    <div class="box">
        <h3>4. Actions:</h3>
        <button id="addBtn">➕ Add Test Credit (₹100)</button>
        <button id="refreshBtn">🔄 Refresh</button>
    </div>
    
    <div class="box">
        <h3>5. Status:</h3>
        <p id="status">Checking...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, getDoc, addDoc, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAWL9DQhuyah1ntZgUwqFHegWcm_uvKyus",
            authDomain: "ok-mart-khata.firebaseapp.com",
            projectId: "ok-mart-khata",
            storageBucket: "ok-mart-khata.firebasestorage.app",
            messagingSenderId: "334851811921",
            appId: "1:334851811921:web:804863c35baa17dd61a670"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const urlParams = new URLSearchParams(window.location.search);
        const customerId = urlParams.get('id');
        
        document.getElementById('customerIdDisplay').innerHTML = customerId || '<span class="error">❌ NO CUSTOMER ID IN URL!</span>';
        
        if (!customerId) {
            document.getElementById('status').innerHTML = '<span class="error">❌ Go to customers page and click on a customer first.</span>';
        }
        
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                document.getElementById('status').innerHTML = '<span class="error">❌ Not logged in!</span>';
                return;
            }
            
            document.getElementById('status').innerHTML = '<span class="success">✅ Logged in as: ' + user.email + '</span>';
            
            if (customerId) {
                await loadCustomerData();
                await loadAllTransactions();
            }
        });
        
        async function loadCustomerData() {
            try {
                const customerRef = doc(db, 'customers', customerId);
                const customerSnap = await getDoc(customerRef);
                
                if (!customerSnap.exists()) {
                    document.getElementById('customerData').innerHTML = '<span class="error">❌ Customer NOT FOUND! Invalid customer ID.</span>';
                    return;
                }
                
                const data = customerSnap.data();
                document.getElementById('customerData').innerHTML = JSON.stringify(data, null, 2);
                document.getElementById('customerData').innerHTML += '\n\n📄 Document ID: ' + customerId;
                
            } catch (error) {
                document.getElementById('customerData').innerHTML = '<span class="error">Error: ' + error.message + '</span>';
            }
        }
        
        async function loadAllTransactions() {
            try {
                // Get ALL ledger entries
                const ledgerRef = collection(db, 'ledger');
                const snapshot = await getDocs(ledgerRef);
                
                const allTransactions = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    allTransactions.push({
                        docId: doc.id,
                        ...data
                    });
                });
                
                if (allTransactions.length === 0) {
                    document.getElementById('transactionData').innerHTML = '<span class="error">⚠️ LEDGER COLLECTION IS EMPTY! No transactions at all.</span>\n\n💡 Click "Add Test Credit" button to add one.';
                    return;
                }
                
                // Show ALL transactions first
                let output = '📋 ALL TRANSACTIONS IN LEDGER (' + allTransactions.length + '):\n';
                output += JSON.stringify(allTransactions, null, 2);
                output += '\n\n---\n\n';
                
                // Filter by customerId
                const matchingTransactions = allTransactions.filter(t => t.customerId === customerId);
                
                if (matchingTransactions.length === 0) {
                    output += '🔍 TRANSACTIONS MATCHING customerId = "' + customerId + '":\n';
                    output += '<span class="error">❌ NONE FOUND!</span>\n\n';
                    output += '💡 Check: customerId in ledger should match: "' + customerId + '"\n';
                    output += '💡 Current customerIds in ledger:\n';
                    const uniqueIds = [...new Set(allTransactions.map(t => t.customerId))];
                    uniqueIds.forEach(id => {
                        output += '   - "' + id + '"\n';
                    });
                } else {
                    output += '✅ FOUND ' + matchingTransactions.length + ' MATCHING TRANSACTIONS:\n';
                    output += JSON.stringify(matchingTransactions, null, 2);
                }
                
                document.getElementById('transactionData').innerHTML = output;
                
            } catch (error) {
                document.getElementById('transactionData').innerHTML = '<span class="error">Error: ' + error.message + '</span>';
            }
        }
        
        async function addTestTransaction() {
            try {
                // Get customer name first
                const customerRef = doc(db, 'customers', customerId);
                const customerSnap = await getDoc(customerRef);
                
                if (!customerSnap.exists()) {
                    alert('Customer not found!');
                    return;
                }
                
                const customerData = customerSnap.data();
                const today = new Date().toISOString().slice(0,10);
                
                await addDoc(collection(db, 'ledger'), {
                    customerId: customerId,
                    customerName: customerData.name || 'Customer',
                    type: 'credit',
                    amount: 100,
                    note: 'Debug test entry',
                    createdAt: new Date(),
                    date: today,
                    voucherNumber: 'DEBUG-' + Date.now()
                });
                
                // Update customer totals
                await updateDoc(customerRef, {
                    totalAdded: (customerData.totalAdded || 0) + 100,
                    totalDue: (customerData.totalDue || 0) + 100
                });
                
                alert('✅ Test transaction added! Refreshing...');
                await loadCustomerData();
                await loadAllTransactions();
                
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }
        
        document.getElementById('addBtn').onclick = addTestTransaction;
        document.getElementById('refreshBtn').onclick = () => {
            loadCustomerData();
            loadAllTransactions();
        };
    </script>
</body>
</html>
