<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Detail - Debug</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .debug-box { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .error { color: red; }
        .success { color: green; }
        button { padding: 10px; margin: 5px; background: #FF5722; color: white; border: none; border-radius: 5px; cursor: pointer; }
        pre { background: #333; color: #0f0; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔧 Debug Mode - Customer Detail</h1>
    
    <div class="debug-box">
        <h3>Customer ID from URL:</h3>
        <p id="customerIdDisplay">Loading...</p>
    </div>
    
    <div class="debug-box">
        <h3>Customer Data:</h3>
        <pre id="customerData">Loading...</pre>
    </div>
    
    <div class="debug-box">
        <h3>Transactions:</h3>
        <pre id="transactions">Loading...</pre>
    </div>
    
    <div class="debug-box">
        <h3>Actions:</h3>
        <button id="addTestCredit">➕ Add Test Credit (₹100)</button>
        <button id="addTestPayment">💰 Add Test Payment (₹100)</button>
        <button id="refreshBtn">🔄 Refresh</button>
    </div>
    
    <div class="debug-box">
        <h3>Status:</h3>
        <p id="status"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, getDoc, addDoc, updateDoc, doc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        
        // Make available globally for debug
        window.Firestore = { collection, getDocs, getDoc, addDoc, updateDoc, doc, query, where, orderBy };
        
        const firebaseConfig = {
            apiKey: "AIzaSyAWL9DQhuyah1ntZgUwqFHegWcm_uvKyus",
            authDomain: "ok-mart-khata.firebaseapp.com",
            projectId: "ok-mart-khata",
            storageBucket: "ok-mart-khata.firebasestorage.app",
            messagingSenderId: "334851811921",
            appId: "1:334851811921:web:804863c35baa17dd61a670"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        window.db = db;
        
        const urlParams = new URLSearchParams(window.location.search);
        const customerId = urlParams.get('id');
        window.customerId = customerId;
        
        document.getElementById('customerIdDisplay').innerHTML = `<strong>${customerId || 'NOT FOUND!'}</strong>`;
        
        if (!customerId) {
            document.getElementById('status').innerHTML = '<span class="error">❌ No customer ID in URL! Go to customers page first.</span>';
        }
        
        // Check login and load data
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                document.getElementById('status').innerHTML = '<span class="error">❌ Not logged in! Redirecting...</span>';
                setTimeout(() => window.location.href = 'login.html', 2000);
                return;
            }
            
            document.getElementById('status').innerHTML = '<span class="success">✅ Logged in as: ' + user.email + '</span>';
            
            if (customerId) {
                await loadCustomerData();
                await loadTransactions();
            }
        });
        
        async function loadCustomerData() {
            try {
                const customerRef = doc(db, 'customers', customerId);
                const customerSnap = await getDoc(customerRef);
                
                if (!customerSnap.exists()) {
                    document.getElementById('customerData').innerHTML = '<span class="error">❌ Customer not found! Invalid customer ID.</span>';
                    return;
                }
                
                const data = customerSnap.data();
                document.getElementById('customerData').innerHTML = JSON.stringify(data, null, 2);
                
            } catch (error) {
                document.getElementById('customerData').innerHTML = '<span class="error">Error: ' + error.message + '</span>';
            }
        }
        
        async function loadTransactions() {
            try {
                const ledgerRef = collection(db, 'ledger');
                const q = query(ledgerRef, where('customerId', '==', customerId), orderBy('createdAt', 'desc'));
                const snapshot = await getDocs(q);
                
                const transactions = [];
                snapshot.forEach(doc => {
                    transactions.push({ id: doc.id, ...doc.data() });
                });
                
                if (transactions.length === 0) {
                    document.getElementById('transactions').innerHTML = '<span class="error">⚠️ No transactions found for this customer!</span>\n\n💡 Try adding a test transaction using the button below.';
                } else {
                    document.getElementById('transactions').innerHTML = JSON.stringify(transactions, null, 2);
                }
                
            } catch (error) {
                document.getElementById('transactions').innerHTML = '<span class="error">Error: ' + error.message + '</span>';
            }
        }
        
        async function addTestTransaction(type, amount) {
            if (!customerId) {
                alert('No customer ID!');
                return;
            }
            
            try {
                const today = new Date().toISOString().slice(0,10);
                const voucherNumber = `TEST-${Date.now()}`;
                
                // Get customer data first
                const customerRef = doc(db, 'customers', customerId);
                const customerSnap = await getDoc(customerRef);
                
                if (!customerSnap.exists()) {
                    alert('Customer not found!');
                    return;
                }
                
                const customerData = customerSnap.data();
                
                // Add to ledger
                await addDoc(collection(db, 'ledger'), {
                    customerId: customerId,
                    customerName: customerData.name || 'Customer',
                    type: type,
                    amount: amount,
                    note: 'Test entry - ' + new Date().toLocaleString(),
                    createdAt: new Date(),
                    date: today,
                    voucherNumber: voucherNumber
                });
                
                // Update customer totals
                let newAdded = customerData.totalAdded || 0;
                let newPaid = customerData.totalPaid || 0;
                
                if (type === 'credit') {
                    newAdded += amount;
                } else {
                    newPaid += amount;
                }
                
                const newDue = newAdded - newPaid;
                
                await updateDoc(customerRef, {
                    totalAdded: newAdded,
                    totalPaid: newPaid,
                    totalDue: newDue,
                    lastPaymentDate: type === 'payment' ? new Date() : null
                });
                
                alert('✅ Transaction added! Refreshing...');
                await loadTransactions();
                await loadCustomerData();
                
            } catch (error) {
                alert('❌ Error: ' + error.message);
                console.error(error);
            }
        }
        
        // Button handlers
        document.getElementById('addTestCredit').onclick = () => addTestTransaction('credit', 100);
        document.getElementById('addTestPayment').onclick = () => addTestTransaction('payment', 100);
        document.getElementById('refreshBtn').onclick = () => {
            loadCustomerData();
            loadTransactions();
        };
    </script>
</body>
</html>
